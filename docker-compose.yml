services:
  db:
    image: postgres:16-alpine
    container_name: mail-viewer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mail_viewer
      POSTGRES_USER: mail_viewer
      POSTGRES_PASSWORD: mail_viewer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mail_viewer -d mail_viewer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
